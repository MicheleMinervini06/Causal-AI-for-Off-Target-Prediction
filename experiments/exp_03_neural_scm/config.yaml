_base: experiments/configs/base.yaml

experiment:
  name: Exp08_LearnedMLP_HardPrior
  tags: ["learned_mlp", "representation_learning", "run_12"]
  notes: "Ablation study: sostituzione delle categorie chimiche fisse con un PairwiseTokenEncoder (embed_dim=4) appreso end-to-end."

model:
  # scegli tra "linear_bypass", "mini_mlp", o "deep_scm"
  architecture: "learned_mlp" 
  
  # Parametri specifici per la nuova architettura (Run 9)
  learned_mlp:
    hidden_dim: 8

  # Parametri base
  embed_dim: 16
  hidden_dim: 32
  encoder: biological_mismatch  # Scegli tra "pairwise" o "biological_mismatch"

training:
  device: cuda  # Usare 'cpu' solo per debug locale
  learning_rate: 0.0001  # Abbassato per stabilizzare i gradienti con pos_weight alto
  batch_size: 64
  epochs: 15
  patience: 99 # Disabilita early stopping per garantire un confronto completo
  pos_weight_dynamic: true  # Se true calcola pos_weight dinamicamente dal train split
  pos_weight: 46.3  # Valore statico di fallback se pos_weight_dynamic == false
  loss_type: focal          # Scegli tra "focal" e "bce"
  focal_alpha: 0.25         # Peso standard per la classe positiva
  focal_gamma: 2.0          # Forza di soppressione per i negativi facili
  lambda_causal: 0.01       # Ridotto per allinearsi alla magnitudo della Focal
  lambda_consist: 0.01      # Ridotto per allinearsi alla magnitudo della Focal
  pct_start: 0.3

  # Parametri specifici per IRM
  irm_enabled: false
  lambda_irm_max: 1.0
  irm_warmup_epochs: 5

phase3:
  fit_split: train
  evaluation_split: test
  max_fit_rows: null  # Subset per prototipazione rapida
  max_eval_rows: null

baseline:
  ccs_json: experiments/results/exp_02_scm/ccs_baseline.json

ccs:
  enabled: true
  mode: 6_rules
  max_guides: 200
  guide_source_split: test

output:
  model_pt: neural_scm.pt
  metrics_changeseq_train_json: metrics_changeseq_train.json
  metrics_changeseq_val_json: metrics_changeseq_val.json
  metrics_changeseq_json: metrics_changeseq.json
  metrics_guideseq_json: metrics_guideseq.json
  ccs_neural_json: ccs_neural.json
  ccs_comparison_json: ccs_comparison.json

tracking:
  enabled: true